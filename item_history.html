<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" type="image/jpg" href="./assets/GLOBUS-WEB-FAVICON-07234.png">
    <script src="./assets/d3.js"></script>
    <link rel="stylesheet" href="./assets/reset.css">
    <link rel="stylesheet" href="./assets/global.css">
    <!-- <script src="plot.js"></script> -->
    <!-- <script src="https://cdn.jsdelivr.net/npm/d3@7"></script> -->
    
    <title>history</title>

<style>
:root {
    --width: 920px;
    --height: 480px;
    --bottom-height: 410px;
    --search-width: 240px;
    --search-input-width: 236px;
    --selected-width:432px;
    --btn-height: 26px;
}

html, body {
    scrollbar-color: hsl(0 0% 100% /0.2) hsl(0 0% 0% /0);
    scrollbar-width: thin;
    scrollbar-gutter: stable both-edges;
}

body {
    font-family: Arial, sans-serif;
    background-color: var(--bg);
    color: var(--fg);

}

main {
    margin: 0px 10px 0px 10px;
}

.layout {
    display: grid;
    grid-template-columns: 1fr auto 1fr; /* left, center, right */
    grid-template-areas: "left center right";
    gap: 16px;
    /* padding: 16px; */
}

/* Assign areas */
.left   { 
    grid-area: left;
}

.center { 
    grid-area: center; 
}

.right  { 
    grid-area: right; 
}

.left, .right {
    border: solid, 1px, var(--bg2);
    margin:2px;
    padding:1px;
}

@media (max-width: 1000px) {
  .layout {
    grid-template-columns: 1fr 1fr;
    grid-template-areas:
      "center center"
      "left right";
  }
}

.bottom-section {
    height: calc(var(--bottom-height));
}

h1 {
    font-size: 10px;
    /* display: none; */
}


.chart {
    width: var(--width);
    height:var(--height);
}

.flex-col {
    display: flex;
    flex-direction: column;
    align-items: center;
}

svg {
    border: 1px solid var(--bg2);
    /* margin: 2px 0px 1px 1px; */
}

svg text {
    fill: var(--fg);
}

.axis line, .axis path {
    fill: none;
    shape-rendering: crispEdges;
}

.axis text {
    font-size: 12px;
}

.legend {
    font-size: 12px;
}

.legend-item {
    margin-bottom: 8px;
    display: flex;
    align-items: center;
}

.legend-color {
    width: 15px;
    height: 15px;
    margin-right: 8px;
    border-radius: 2px;
}

.tooltip {
    position: absolute;
    background: var(--bg);
    border: 1px solid var(--bg2);
    padding: 5px;
    border-radius: 5px;
    pointer-events: none;
    opacity: 0;
}

.input-container {
    display: flex;
    flex-direction: row;
    /* gap: 2px; */
    /* margin:6px 0; */
    padding: 2px 0px;
    align-items:center;
    justify-content: space-between;
}

.instructions {
    width: 360px;
}

#clearAllBtn {
    border: 1px solid var(--fg);
    border-radius: 4px; 
    background-color: var(--bg2);
    color: var(--fg);
    font-size:12px;
    /* height: 100%; */
    height:var(--btn-height);
}

#clearAllBtn:hover {
    background-color: var(--bg3);
}

#clearAllBtn:active {
    background-color: var(--bg);
}

.remove-button {
    margin-left: 10px;
    cursor: pointer;
    color: var(--fg);
}

#fileInput {
    width: var(--search-width);
    /* border: 1px solid var(--bg2); */
    /* border-radius: 4px;  */
    font-size: 14px;
}

input[type="file"]::file-selector-button {
    border: 1px solid var(--fg);
    border-radius: 4px; 
    background-color: var(--bg2);
    color: var(--fg);
    height:var(--btn-height);
    font-size:12px;
}

#searchInput {
    background-color: var(--bg);
    color: var(--fg);
    border: 1px solid var(--bg2);
    margin:0 8px 4px 0;
    /* padding: 2px; */
    width: var(--search-input-width)
}

#searchInput::placeholder {
    color: var(--fg2);
}

.item-container{
    display: flex;
    flex-direction: row;
    height: var(--bottom-height);
    justify-content: space-between;
    align-items:center;
}

.item-list {
    border: 1px solid var(--bg2);
    height: var(--bottom-height);
    width: var(--search-width);
    overflow-y: auto;
    /* padding:1px; */
    font-size: 14px;
}

.item-list-item {
    cursor: pointer;
    padding: 2px 0px 0px 4px;
}

#selectedItems {
    margin-top: 10px;
    flex-grow: 1;
    padding: 10px;
    margin:0;
}

#selectedItems li {
    list-style-type: none;
}

textarea {
    height: var(--bottom-height);
    width: var(--search-width);
    background-color: var(--bg2);
    color: var(--fg);

    border-width: 0;
    /* border-radius: 4px; */

    /* scrollbar-color: hsl(0 0% 100% /0.2) hsl(0 0% 0% /0);
    /* scrollbar-width: thin; */
    /* scrollbar-gutter: stable both-edges; */
    resize:none;
    font-size: 14px;
    padding: 4px;
}

.selected-container {
    width: var(--selected-width);
    height: var(--bottom-height);
    border: 1px solid var(--bg2);
    /* padding:1px; */
}

</style>
</head>



<body class="layout">
<main class="center">
    <!-- <a href="./index.html"><h1>GGS</h1></a> -->
    <svg class="chart" width="920" height="480"></svg>
    <section>
        <div class="input-container">
            <input type="text" id="searchInput" placeholder="Search..."/>
            <input type="file" id="fileInput" accept=".csv" />
            <div class="muted instructions">Export <a target="_blank" href="https://gg-sql-01.globalglove.com/Reports/report/Data%20Analyst/Sales%20History%20order%20date">Sales History order date</a> as a CSV and import into this page using the choose file input.</div>
            <!-- <text for="searchInput">Search for Item IDs: </label> -->
            <button id="clearAllBtn">Clear All</button>
            </div>
            <div class="item-container">
                <div class="item-list" id="itemList"></div>
                <textarea name="search_area" id="search_area"></textarea>
                <div class="selected-container">
                    <!-- <h3>Selected Item IDs:</h3> -->
                    <ul id="selectedItems"></ul>
                </div>
            </div>
            <div class="tooltip" id="tooltip"></div>
    </section>
</main>
<section class="left"></section>
<section class="right">
    <!-- <h2>Customers</h2> -->
</section>



<script>
// init theme colors
let themeColors = d3.schemeTableau10
function setTheme(){
    if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
        // themeColors = d3.schemeSet3
        themeColors = d3.schemeTanner10
    } else {
        themeColors = d3.schemeTableau10
    }
    // console.log("themeColors",themeColors)
}
setTheme();
window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', event => {
    setTheme()
});


// init global variables
const margin = { top: 20, right: 30, bottom: 30, left: 40 };
const width = +d3.select("svg").attr("width") - margin.left - margin.right;
const height = +d3.select("svg").attr("height") - margin.top - margin.bottom;

const svg = d3.select("svg")
.append("g")
.attr("transform", `translate(${margin.left},${margin.top})`);

const tooltip = d3.select("#tooltip");

let salesData = [];
let uniqueItems = [];
const revLineColor = "#75c058"

// define functions
function resetTextArea() {
    textArea = document.getElementById('search_area')
    textArea.value = ""
    textArea.placeholder = "Paste whole skus here...\n\nWorks well with my item search tool...\n\nfind the item search and other tools here:\nggs.tannerr.com"
}

function sanitizeId(id) {
    return id.replace(/[^a-zA-Z0-9_-]/g, '_');
}

function handleFileInput() {
    const file = this.files[0];
    if (file) {
        const reader = new FileReader();
        reader.onload = function (e) {
            const content = e.target.result;
            // salesData = d3.csvParse(content, d => {
            //     let [month, day, year] = d.order_date.split('/').map(Number); // order date or invoice_date
            //     const qty_shipped = +d.qty_shipped; // qty shipped or requested
            //     const pricing_unit_size = +d.pricing_unit_size;
            //     if (year < 100) {
            //         // console.log(year)
            //         year += 2000; // 26 -> 2026
            //     }
            //     return {
            //         order_date: new Date(year, month - 1, day),
            //         item_id: d.item_id,
            //         purch_qty: pricing_unit_size !== 0 ? qty_shipped / pricing_unit_size : null,
            //         revenue : (+d.qty_shipped_sales_unit || 0) * (+d.unit_price || 0)
            //     };
            // }).sort((a,b)=> a.order_date - b.order_date); // order oldest to newest
            salesData = d3.csvParse(content, d => {
                // pick the right date field if needed
                const dateStr = d.order_date ?? d.invoice_date;
                const dateParts = String(dateStr).split('/');
                let month = Number(dateParts[0]);
                let day   = Number(dateParts[1]);
                let year  = Number(dateParts[2]);

                if (year < 100 && Number.isFinite(year)) year += 2000;

                const qty_shipped_sales_unit = Number(d.qty_shipped_sales_unit);
                const unit_price = Number(d.unit_price);

                const revenue = qty_shipped_sales_unit * unit_price;

                const pricing_unit_size = Number(d.pricing_unit_size);
                const qty_shipped = Number(d.qty_shipped);

                const orderDate = new Date(year, month - 1, day);

                return {
                    order_date: orderDate,
                    item_id: d.item_id,
                    purch_qty: (pricing_unit_size !== 0 && Number.isFinite(qty_shipped) && Number.isFinite(pricing_unit_size))
                    ? qty_shipped / pricing_unit_size
                    : null,
                    revenue
                };
            })
            // IMPORTANT: drop invalid rows so the chart never sees NaN
            .filter(d =>
            d.order_date instanceof Date &&
            Number.isFinite(d.order_date.getTime()) &&
            Number.isFinite(d.revenue) &&
            d.item_id != null
            )
            .sort((a, b) => a.order_date - b.order_date);

            console.log("salesData", salesData);

            uniqueItems = [...new Set(salesData.map(d => d.item_id))].sort(); // Get unique item IDs
            updateSearchResults(); // Update the list with all items initially
            // renderChart(salesData, []); // Render chart with no items selected
            renderTotalChart(salesData)
        };
        reader.readAsText(file);
    }
}

function updateSearchResults() {
    const searchValue = d3.select("#searchInput").property("value").toLowerCase();
    const filteredItems = uniqueItems.filter(item => item.toLowerCase().includes(searchValue));

    const itemList = d3.select("#itemList");
    itemList.selectAll("*").remove(); // Clear existing items

    filteredItems.forEach(item => {
        itemList.append("div")
            .attr("class", "item-list-item")
            .text(item)
            .on("click", () => addItemToList(item)); // Add item to list on click
    });
}

function addItemToList(item) {
    const selectedItemsList = d3.select("#selectedItems");
    if (!selectedItemsList.selectAll(`li[data-item="${item}"]`).size()) {
        const listItem = selectedItemsList.append("li").attr("data-item", item);
        
        // Add a remove button to the list item FIRST
        listItem.append("span")
            .attr("class", "remove-button")
            .text("✖  ")
            .on("click", function () {
                d3.select(this.parentNode).remove(); // Remove the item from the list
                renderChart(salesData, getSelectedItems()); // Update the chart
            });
    
        // Add the item text AFTER the button
        listItem.append("span")
            .text(item);
        setTheme()
        renderChart(salesData, getSelectedItems());
    }
}

function getSelectedItems() {
    return d3.select("#selectedItems").selectAll("li").nodes().map(li => li.dataset.item);
}

function parseSearchList(text) {
  return text
    .split(/[\s,]+/)
    .map(s => s.trim().toUpperCase())
    .filter(Boolean);
}

function debounce(fn, wait = 300) {
    let t;
    return (...args) => {
        clearTimeout(t);
        t = setTimeout(()=> fn(...args), wait)
    }
}

function addItemsToList(items) {
    const selectedItemsList = d3.select("#selectedItems");
    items.forEach((item)=>{
        if (!selectedItemsList.selectAll(`li[data-item="${item}"]`).size()) {
            const listItem = selectedItemsList.append("li").attr("data-item", item);
            
            listItem.append("span")
                .attr("class", "remove-button")
                .text("✖  ")
                .on("click", function () {
                    d3.select(this.parentNode).remove(); // Remove the item from the list
                    renderChart(salesData, getSelectedItems()); // Update the chart
                });

            listItem.append("span")
                .text(item);
        }
    });
    setTheme()
    renderChart(salesData, getSelectedItems());

}

function doSearchAndRender() {
    const raw = document.getElementById('search_area').value;
    console.log(raw)
    const list = parseSearchList(raw);
    console.log(list)
    addItemsToList(list)
}

function renderChart(data, selectedItems) {
    const filteredData = data.filter(d => selectedItems.includes(d.item_id));

    // Aggregating data by month
    const aggregatedData = d3.rollup(filteredData,
        v => d3.sum(v, d => d.purch_qty),
        d => d3.timeMonth(d.order_date),
        d => d.item_id // Group by item ID as well
    );
    console.log('aggregatedData',aggregatedData);

    // const monthlySales = Array.from(aggregatedData, ([date, itemData]) => {
    //     return Array.from(itemData, ([itemId, qty]) => ({ date, itemId, qty }));
    // }).flat();

    // 1) all items that appear anywhere in your data
    const allItemIds = new Set(filteredData.map(d => d.item_id));

    // 2) month range to cover (from min to max order_date)
    const monthStart = d3.timeMonth.floor(d3.min(filteredData, d => d.order_date));
    const monthEnd   = d3.timeMonth.floor(d3.max(filteredData, d => d.order_date));

    // If you want a fixed range instead, replace with your own start/end.
    const months = d3.timeMonth.range(monthStart, d3.timeMonth.offset(monthEnd, 1));

    // 3) build full grid: every month x every itemId, qty=0 if missing
    const monthlySales = months.flatMap(date => {
        const itemMap = aggregatedData.get(date); // Map<itemId, qty> or undefined
        return Array.from(allItemIds, itemId => ({
            date,
            itemId,
            qty: itemMap?.get(itemId) ?? 0
        }));
    });
    console.log('monthlySales', monthlySales);

    const x = d3.scaleTime()
        .domain(d3.extent(monthlySales, d => d.date))
        .range([0, width]);

    const y = d3.scaleLinear()
        .domain([0, d3.max(monthlySales, d => d.qty)]).nice()
        .range([height, 0]);

    svg.selectAll("*").remove(); // Clear previous chart

    // X Axis
    svg.append("g")
        .attr("class", "axis")
        .attr("transform", `translate(0,${height})`)
        .call(d3.axisBottom(x));

    // Y Axis
    svg.append("g")
        // .attr("transform", `translate(20,0)`)
        .attr("class", "axis")
        .call(d3.axisLeft(y));

    // Line generator
    const line = d3.line()
        .x(d => x(d.date))
        .y(d => y(d.qty));

    // Draw lines for each selected item
    const items = Array.from(new Set(monthlySales.map(d => d.itemId)));
    items.forEach(itemId => {
        const itemData = monthlySales.filter(d => d.itemId === itemId);
        const sanitizedId = sanitizeId(itemId); // Add this line

        // Draw the line
        svg.append("path")
            .datum(itemData)
            .attr("fill", "none")
            .attr("stroke", themeColors[items.indexOf(itemId) % 10]) // Cycle through colors
            .attr("stroke-width", 1.5)
            .attr("d", line);

        // Add hover effect for data points
        svg.selectAll(".dot-" + sanitizedId)
            .data(itemData)
            .enter().append("circle")
            .attr("class", "dot dot-" + sanitizedId) // Unique class for each item
            .attr("cx", d => x(d.date))
            .attr("cy", d => y(d.qty))
            .attr("r", 4) // Circle radius
            .attr("fill", themeColors[items.indexOf(itemId) % 10])
            .on("mouseover", function (event, d) {
                // this function runs everytime on hover
                // Format date as MM-YYYY
                const formattedDate = new Date(d.date).toLocaleDateString('en-US', { 
                    month: '2-digit', 
                    year: 'numeric' 
                });
                
                tooltip
                    .style("opacity", 1)
                    .html("Item: " + itemId + "<br>Qty: " + d.qty + "<br>Date: " + formattedDate)
                    .style("left", (event.pageX + 5) + "px")
                    .style("top", (event.pageY - 28) + "px");
            })
            .on("mouseout", function () {
                tooltip.style("opacity", 0);
            });
    });
    
    // Add Legend
    const legendX = width-840;
    const legendY = 0;
    
    const legend = svg.append("g")
        .attr("class", "legend")
        .attr("transform", `translate(${legendX}, ${legendY})`);

    items.forEach((itemId, index) => {
        const legendItem = legend.append("g")
            .attr("class", "legend-item")
            .attr("transform", `translate(0, ${index * 20})`);

        // Color box
        legendItem.append("rect")
            .attr("class", "legend-color")
            .attr("fill", themeColors[index % 10]);

        // Item label
        legendItem.append("text")
            .attr("x", 20)
            .attr("y", 12)
            .text(itemId);
    });
    svg.append("text")
    .attr("x", width / 2)
    .attr("y", 0)
    .attr("text-anchor", "middle")
    .style("font-size", "14px")
    .style("font-weight", "bold")
    .text("Quantity shipped");
}

function renderTotalChart(data) {
    console.log(data.slice(0, 10));

    // Aggregate total revenue by month
    const monthlyRevenue = Array.from(
    d3.rollup(
        data,
        rows => d3.sum(rows, d => d.revenue ?? 0),
        d => d3.timeMonth(d.order_date)
    ),
    ([date, revenue]) => ({ date, revenue })
    ).sort((a, b) => a.date - b.date);

    console.log("monthlyRevenue", monthlyRevenue);

    // Create scales
    const x = d3.scaleTime()
        .domain(d3.extent(monthlyRevenue, d => d.date))
        .range([0, width]);

    const y = d3.scaleLinear()
        .domain([0, d3.max(monthlyRevenue, d => d.revenue)])
        .nice()
        .range([height, 0]);

    // Clear previous chart
    svg.selectAll("*").remove();

    // X Axis
    svg.append("g")
        .attr("class", "axis")
        .attr("transform", `translate(0,${height})`)
        .call(d3.axisBottom(x));

    // Y Axis
    svg.append("g")
        .attr("class", "axis")
        // .attr("transform", `translate(20,0)`)
        .call(
            d3.axisLeft(y)
                .tickFormat(d => d3.formatPrefix(".1", 1e6)(d))
                // .tickFormat(d3.formatPrefix(".2", 1e6))  // e.g., 3.75M
                // .tickFormat(d3.format("$,.0f"))

        );

    // Line generator
    const line = d3.line()
        .x(d => x(d.date))
        .y(d => y(d.revenue));

    // Revenue line
    svg.append("path")
        .datum(monthlyRevenue)
        .attr("fill", "none")
        .attr("stroke", revLineColor)
        .attr("stroke-width", 3)
        .attr("d", line);

    // Revenue points
    svg.selectAll(".revenue-dot")
        .data(monthlyRevenue)
        .enter()
        .append("circle")
        .attr("class", "revenue-dot")
        .attr("cx", d => x(d.date))
        .attr("cy", d => y(d.revenue))
        .attr("r", 4)
        .attr("fill", revLineColor)
        .on("mouseover", function (event, d) {

            const formattedDate = d.date.toLocaleDateString("en-US", {
                month: "2-digit",
                year: "numeric"
            });

            tooltip
                .style("opacity", 1)
                .html(`
                    Revenue: ${d3.format("$,.2f")(d.revenue)}<br>
                    Date: ${formattedDate}
                `)
                .style("left", (event.pageX + 5) + "px")
                .style("top", (event.pageY - 28) + "px");

        })
        .on("mouseout", function () {
            tooltip.style("opacity", 0);
        });

    // Optional chart title
    svg.append("text")
        .attr("x", width / 2)
        .attr("y", 0)
        .attr("text-anchor", "middle")
        .style("font-size", "14px")
        .style("font-weight", "bold")
        .text("Monthly Revenue by order date ($)");
}

function handleClearAll() {
    d3.select("#selectedItems").selectAll("*").remove(); // remove selected items
    // renderChart(salesData, []); // reset chart with no data
    d3.select("#searchInput").property("value", ""); // clear text area
    updateSearchResults();
    resetTextArea();
    renderTotalChart(salesData)
}


// invoke functions
resetTextArea()

// event listeners
d3.select('#fileInput').on('change', handleFileInput);
d3.select("#searchInput").on("input", updateSearchResults);
d3.select("#search_area").on("input", debounce(doSearchAndRender, 100));
d3.select("#clearAllBtn").on("click", handleClearAll);

</script>
</body>
</html>
