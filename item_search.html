<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>item search</title>
  
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <link rel="stylesheet" href="./assets/global.css">
  <link rel="shortcut icon" type="image/jpg" href="./assets/GLOBUS-WEB-FAVICON-07234.png">

<style>
main {
  display: flex;
  flex-direction: column;
}

.muted { color:#666; font-size:0.9em; }
.error { color: #b00; }

input[type="file"]::file-selector-button {
  border: 1px solid var(--bg2);
  border-radius: 4px;      
  background-color: var(--bg2);
  color: var(--fg);
  margin: 0px 4px 8px 0px;
}

button {
  border: 1px solid var(--bg2);
  border-radius: 4px;    
  width: 204px;
  background-color: var(--bg2);
  color: var(--fg);
  margin-bottom: 8px;
}

textarea {
    height: 400px;
    width: 200px;
    /* padding: 2px; */
    border-width: 0;
    background-color: var(--bg2);
    color: var(--fg);
    border-radius: 4px;
    scrollbar-color: hsl(0 0% 100% /0.2) hsl(0 0% 0% /0);
    /* scrollbar-width: thin; */
    /* scrollbar-gutter: stable both-edges; */
    resize:none;  
    margin: 0px 32px 0px 0px;
}

section{
  display: flex;
  flex-direction: row;
}

p {
  margin:0px 0px 8px 0px;
}
#output {
  margin:0px;
}
ul {
    list-style-type: none;
    padding: 0px;
}
li {
  margin-bottom: 4px;
}
#instructions {
  width: 200px;
}
</style>
</head>
<body>
  


<!-- +++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++ -->
<main>
  <a target="_blank"  href="./index.html"><h1>GGS</h1></a>

  <div>
    <button id="clearBtn">Clear</button>
    <button id="copyBtn">Copy items</button>
  </div>
  <section>
    <div>
      <textarea id="input"></textarea>
      <div id="instructions">
        <input id="fileInput" type="file" accept=".csv" />
        <div class="muted">Export <a target="_blank" href="https://gg-sql-01.globalglove.com/Reports/report/Data%20Analyst/All%20Active%20Items">All Active Items</a> as a CSV and import into this page using the choose file input above.</div>
        <label class="muted" style="display:block;margin:8px 0px">Enter shortcodes (comma, newline or space separated)</label>
      </div>
    </div>
    <ul id="output"></ul>
  </section>
</main>
<!-- +++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++ -->


<script>

document.getElementById('copyBtn').addEventListener('click', async () => {
  const list = document.getElementById('output');
  const items = Array.from(list.querySelectorAll('li'))
    .map(li => li.textContent.trim())
    .filter(Boolean);
  const text = items.join('\n');

  try {
    await navigator.clipboard.writeText(text);
    // optional: give feedback
    console.log('Copied to clipboard:', text);
  } catch (err) {
    // fallback for older browsers
    const textarea = document.createElement('textarea');
    textarea.value = text;
    textarea.style.position = 'fixed';
    textarea.style.left = '-9999px';
    document.body.appendChild(textarea);
    textarea.select();
    try { document.execCommand('copy'); console.log('Copied (fallback)'); }
    catch(e) { console.error('Copy failed', e); }
    document.body.removeChild(textarea);
  }
});


let allItems = [];
const fileInput = document.getElementById('fileInput');

function normalizeHeaders(row) {
  const normalized = {};
  for (const key in row) {
    normalized[key.trim().toLowerCase()] = row[key];
  }
  // ensure keys exist
  return {
    item_id: normalized['item_id'] ?? normalized['id'] ?? '',
    short_code: normalized['short_code'] ?? normalized['shortcode'] ?? normalized['sku'] ?? '',
    parent_item: normalized['parent_item'] ?? normalized['parentitem'] ?? normalized['parent'] ?? ''
  };
}

function loadCsvFile(file) {
  const reader = new FileReader();
  reader.onload = (e) => {
    const text = e.target.result;
    try {
      const parsed = d3.csvParse(text);
      allItems = parsed.map(r => {
        const n = normalizeHeaders(r);
        return {
          item_id: String(n.item_id).trim(),
          short_code: String(n.short_code).trim(),
          parent_item: n.parent_item === undefined ? '' : String(n.parent_item).trim()
        };
      });
    } catch (err) {
      document.getElementById('output').innerHTML = `<p class="error">CSV parse error: ${err.message}</p>`;
    }
  };
  reader.readAsText(file);
}

fileInput.addEventListener('change', (ev) => {
  const f = ev.target.files[0];
  if (f) loadCsvFile(f);
});

function parseSearchList(text) {
  return text
    .split(/[\s,]+/)
    .map(s => s.trim())
    .filter(Boolean);
}

function searchItems(searchList) {
  if (!allItems.length) throw new Error('No CSV loaded');
  const reduced = allItems.map(({ item_id, short_code, parent_item }) => ({ item_id, short_code, parent_item }));
  const results = [];
  for (const token of searchList) {
    const matches = reduced.filter(r => r.short_code === token);
    if (matches.length === 0) {
      throw new Error(`${token} ITEM NOT FOUND`);
    }
    results.push(...matches);
  }
  return results;
}

// TODO
// create aseparate function to find the shortcodes of linked items
// display the linked items in another div labeled linked...


function debounce(fn, wait = 300) {
  let t;
  return (...args) => {
    clearTimeout(t);
    t = setTimeout(() => fn(...args), wait);
  };
}

const doSearchAndRender = () => {
  const raw = document.getElementById('input').value;
  const list = parseSearchList(raw);
  const out = document.getElementById('output');
  if (!list.length) {
    out.innerHTML = '';
    return;
  }
  try {
    const ids = searchItems(list);
    console.log(ids)
    out.innerHTML = "";
    ids.forEach(id => {
      li = document.createElement("li")
      li.textContent = id.item_id
      out.appendChild(li)
    });
  } catch (err) {
    out.innerHTML = `<p class="error">${err.message}</p>`;
  }
};

const debouncedSearch = debounce(doSearchAndRender, 250);
document.getElementById('input').addEventListener('input', debouncedSearch);

document.getElementById('clearBtn').addEventListener('click', () => {
  document.getElementById('input').value = '';
  document.getElementById('output').innerHTML = '';
});


</script>
</body>
</html>
