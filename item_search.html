  <script>
    let allItems = []; // loaded dataset

    // --- CSV loading with D3 ---
    const fileInput = document.getElementById('fileInput');
    // const dropzone = document.getElementById('dropzone');

    function normalizeHeaders(row) {
      const normalized = {};
      for (const key in row) {
        normalized[key.trim().toLowerCase()] = row[key];
      }
      // ensure keys exist
      return {
        item_id: normalized['item_id'] ?? normalized['id'] ?? '',
        short_code: normalized['short_code'] ?? normalized['shortcode'] ?? normalized['sku'] ?? '',
        parent_item: normalized['parent_item'] ?? normalized['parentitem'] ?? normalized['parent'] ?? ''
      };
    }

    function loadCsvFile(file) {
      const reader = new FileReader();
      reader.onload = (e) => {
        const text = e.target.result;
        try {
          const parsed = d3.csvParse(text);
          allItems = parsed.map(r => {
            const n = normalizeHeaders(r);
            return {
              item_id: String(n.item_id).trim(),
              short_code: String(n.short_code).trim(),
              parent_item: n.parent_item === undefined ? '' : String(n.parent_item).trim()
            };
          });
          // document.getElementById('output').innerHTML = `<p>Loaded ${allItems.length} rows.</p>`;
        } catch (err) {
          document.getElementById('output').innerHTML = `<p class="error">CSV parse error: ${err.message}</p>`;
        }
      };
      reader.readAsText(file);
    }

    fileInput.addEventListener('change', (ev) => {
      const f = ev.target.files[0];
      if (f) loadCsvFile(f);
    });

    // // drag/drop
    // dropzone.addEventListener('dragover', (e) => { e.preventDefault(); dropzone.style.borderColor = '#666'; });
    // dropzone.addEventListener('dragleave', () => { dropzone.style.borderColor = '#aaa'; });
    // dropzone.addEventListener('drop', (e) => {
    //   e.preventDefault();
    //   dropzone.style.borderColor = '#aaa';
    //   const f = e.dataTransfer.files[0];
    //   if (f) loadCsvFile(f);
    // });

    // --- search logic ---
    function parseSearchList(text) {
      return text
        .split(/[\s,]+/)
        .map(s => s.trim())
        .filter(Boolean);
    }

    function searchItems(searchList) {
      if (!allItems.length) throw new Error('No CSV loaded');
      // reduce dataset to needed columns (preserve strings)
      const reduced = allItems.map(({ item_id, short_code, parent_item }) => ({ item_id, short_code, parent_item }));
      const results = [];
      for (const token of searchList) {
        const matches = reduced.filter(r => r.short_code === token);
        if (matches.length === 0) {
          throw new Error(`${token} ITEM NOT FOUND`);
        }
        results.push(...matches);
      }
      return results;
    }

    //   // unique preserve order
    //   const seen = new Set();
    //   const ids = [];
    //   for (const r of rows) {
    //     const id = String(r.item_id ?? '').trim();
    //     if (id && !seen.has(id)) { seen.add(id); ids.push(id); }
    //   }
    //   return ids.join('\n');

    function debounce(fn, wait = 300) {
      let t;
      return (...args) => {
        clearTimeout(t);
        t = setTimeout(() => fn(...args), wait);
      };
    }

    const doSearchAndRender = () => {
      const raw = document.getElementById('input').value;
      const list = parseSearchList(raw);
      const out = document.getElementById('output');
      if (!list.length) {
        out.innerHTML = '';
        return;
      }
      try {
        const ids = searchItems(list);
        console.log(ids)
        // const text = renderItemIdsText(ids);
        // out.innerHTML = `
        //   <div>
        //     <textarea id="idsArea" style="width:100%;height:160px;">${text}</textarea>
        //     <div style="margin-top:8px">
        //       <button id="copyBtn">Copy</button>
        //     </div>
        //   </div>`;

        // document.getElementById('copyBtn').addEventListener('click', () => {
        //   const ta = document.getElementById('idsArea');
        //   ta.select();
        //   document.execCommand('copy');
        // });

        // out.innerHTML = `
        //   <div>
        //     <div id="idsArea">${text}</div>
        //   </div>`;
        out.innerHTML = "";
        ids.forEach(id => {
          li = document.createElement("li")
          li.textContent = id.item_id
          out.appendChild(li)
        });
      } catch (err) {
        out.innerHTML = `<p class="error">${err.message}</p>`;
      }
    };

    const debouncedSearch = debounce(doSearchAndRender, 250);
    document.getElementById('input').addEventListener('input', debouncedSearch);

    document.getElementById('clearBtn').addEventListener('click', () => {
      document.getElementById('input').value = '';
      document.getElementById('output').innerHTML = '';
    });
