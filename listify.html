<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>listify</title>
    <link rel="stylesheet" href="./assets/global.css">
    <link rel="shortcut icon" type="image/jpg" href="./assets/GLOBUS-WEB-FAVICON-07234.png">
    <style>
        main {
            display: flex;
            flex-direction: column;
        }
        button {
            width: 200px;
        }
        .copy-feedback {
            opacity: 0;
            transition: opacity 0.3s;
        }
        .copy-feedback.show {
            opacity: 1;
        }
        textarea {
            height: 600px;
            width: 200px;
            padding: 2px;
            border-width: 0;
            border-radius: 4px;
            background-color: var(--bg2);
            color: var(--fg);
        }
        textarea::placeholder {
            color: var(--bg3);          
        }
        .container {
            display: flex;
            flex-direction: row;
        }
        .form-group {
            margin-right: 20px;
        }
        .form-group > button:active {
            background-color: var(--bg);
        }
        .link-btn {
            background-color: var(--bg2);
            color:var(--fg);
            border-radius: 4px;
            border: var(--bg2) 1px solid;
            margin: 0px 0px 10px 0px;
            padding: 10px;

        }

        .link-btn:active {
            background-color: var(--bg);
        }

        .link-btn:hover{
            background-color: var(--bg3);
        }
    </style>
</head>
<body> 
    <main>
    <a target="_blank"  href="./index.html"><h1>GGS</h1></a>
    <!-- <p class="subtitle">Convert your list to quoted strings with trailing commas</p> -->
    <div class="container">
        <div class="form-group">
            <button class="link-btn" onclick="clearAll()">Clear</button>
            <br>
            <button class="link-btn" onclick="selectInput()">Select All</button>
            <br>
            <label for="input">Paste your list:</label>
            <br>
            <textarea id="input" placeholder="GLO-01BA-7XL&#10;GLO-01BA-L&#10;GLO-01BA-M&#10;..."></textarea>
        </div>

        <div class="form-group">
            <button class="link-btn" onclick="copyToClipboard()">Copy to Clipboard</button>
            <br>
            <button class="link-btn" onclick="selectOutput()">Select All</button>
            <br>
            <label for="output">Formatted output:</label>
            <br>
            <textarea id="output" readonly></textarea>
            <br>
            <div class="copy-feedback" id="feedback">✓ Copied to clipboard!</div>
        </div>
    </div>
    </main>


    <script>
        const inputField = document.getElementById('input');
        const outputField = document.getElementById('output');
        let saveTimeout;

        function formatList() {
            const input = inputField.value;
            const lines = input.split('\n')
                .map(line => line.trim())
                .filter(line => line.length > 0);

            const formatted = lines.map(line => `'${line}',`).join('\n');
            outputField.value = formatted;

            // Clear existing timeout and set new one
            clearTimeout(saveTimeout);
            saveTimeout = setTimeout(() => {
                localStorage.setItem('inputData', inputField.value);
            }, 10);
        }

        function copyToClipboard() {
            const input = inputField.value;
            const lines = input.split('\n')
                .map(line => line.trim())
                .filter(line => line.length > 0);

            const formatted = lines.map(line => `'${line}',`).join('');
            
            // Copy to clipboard without newlines
            navigator.clipboard.writeText(formatted).then(() => {
                // Show feedback
                const feedback = document.getElementById('feedback');
                feedback.classList.add('show');
                setTimeout(() => {
                    feedback.classList.remove('show');
                }, 2000);
            });
        }

        function selectInput() {
            inputField.focus();
            inputField.select();
        }

        function selectOutput() {
            outputField.focus();
            outputField.select();
        }

        function clearAll() {
            inputField.value = '';
            outputField.value = '';
            localStorage.removeItem('inputData');
            inputField.focus();
        }

        // Load from local storage on page load
        window.addEventListener('load', () => {
            const savedData = localStorage.getItem('inputData');
            if (savedData) {
                inputField.value = savedData;
                formatList();
            }
        });

        // Format on input change
        inputField.addEventListener('input', formatList);
    </script>
</body>
</html>
